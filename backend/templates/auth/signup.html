{% extends "base.html" %}

{% block title %}Sign Up - AgriHaul{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join AgriHaul today</p>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="full_name" class="form-label">Full Name</label>
                <input 
                    type="text" 
                    id="full_name" 
                    name="full_name" 
                    class="form-input" 
                    placeholder="Your full name"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    placeholder="your@email.com"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="phone" class="form-label">Phone Number</label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone_number" 
                    class="form-input" 
                    placeholder="9876543210"
                >
            </div>
            
            <div class="form-group">
                <label for="role" class="form-label">I am a...</label>
                <select id="role" name="role" class="form-input" required>
                    <option value="">-- Select Role --</option>
                    <option value="farmer">🚜 Farmer (Need to transport goods)</option>
                    <option value="driver">🚛 Driver (Provide transportation)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input" 
                    placeholder="At least 6 characters"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirm_password" 
                    name="confirm_password" 
                    class="form-input" 
                    placeholder="Repeat password"
                    required
                >
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">
                ✓ Create Account
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}" class="auth-link">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
